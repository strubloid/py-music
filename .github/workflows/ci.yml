name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install frontend dependencies from lockfile
        run: npm ci
        working-directory: frontend

      - name: Validate committed lockfile consistency
        run: git diff --exit-code -- frontend/package.json frontend/package-lock.json

      - name: Install backend and validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Validate formatting
        run: npm run format:check

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration and end-to-end tests
        run: npm run test:integration
        env:
          PYMUSIC_DISABLE_BACKGROUND_INIT: "1"

      - name: Generate test coverage
        run: npm run test:coverage
        env:
          PYMUSIC_DISABLE_BACKGROUND_INIT: "1"

      - name: Build production application
        run: npm run build

      - name: Run repository-specific checks
        run: npm run check:repository

      - name: Audit Node.js dependencies
        run: npm --prefix frontend audit --audit-level=high

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            frontend/coverage/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload end-to-end test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: warn
          retention-days: 14
